<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎭 Random Joke Generator - JokeAPI Studio</title>
    <style>
        :root {
            --primary: #ff5500;
            --primary-glow: rgba(255, 85, 0, 0.45);
            --bg-dark: #0a0a0c;
            --card-bg: #141418;
            --code-bg: #070709;
            --text-main: #ffffff;
            --text-muted: #888888;
            --accent-cyan: #00f2fe;
            --accent-green: #1ed760;
            --accent-purple: #9d4edd;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, var(--bg-dark) 0%, #1a0a1a 100%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated Background Orbs */
        .cosmic-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(90px);
            z-index: 0;
            opacity: 0.3;
            pointer-events: none;
            animation: drift 14s infinite alternate ease-in-out;
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: var(--primary);
            top: -100px;
            left: -100px;
        }

        .orb-2 {
            width: 350px;
            height: 350px;
            background: var(--accent-purple);
            bottom: -50px;
            right: -100px;
            animation-duration: 18s;
        }

        @keyframes drift {
            0% {
                transform: translate(0, 0) scale(1);
            }
            100% {
                transform: translate(50px, 40px) scale(1.1);
            }
        }

        /* Main Container */
        .container {
            max-width: 900px;
            width: 100%;
            z-index: 10;
            position: relative;
        }

        .header {
            text-align: center;
            margin-bottom: 48px;
        }

        .header h1 {
            font-size: 3.2rem;
            font-weight: 900;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #fff 0%, var(--primary) 50%, var(--accent-cyan) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        .header p {
            color: var(--text-muted);
            font-size: 1.1rem;
            font-weight: 500;
        }

        /* Main Joke Card */
        .joke-card {
            background: rgba(20, 20, 24, 0.7);
            backdrop-filter: blur(32px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 28px;
            padding: 48px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
            margin-bottom: 32px;
            min-height: 300px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
        }

        .joke-card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
        }

        .joke-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 242, 254, 0.1);
            border: 1px solid rgba(0, 242, 254, 0.3);
            color: var(--accent-cyan);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 800;
            width: fit-content;
            margin-bottom: 20px;
        }

        .joke-category {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .dot-loader {
            width: 8px;
            height: 8px;
            background: var(--accent-cyan);
            border-radius: 50%;
            display: inline-block;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.3;
                transform: scale(1.3);
            }
        }

        .joke-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 16px;
        }

        .joke-text {
            font-size: 1.8rem;
            font-weight: 700;
            line-height: 1.5;
            color: #fff;
        }

        .joke-setup {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 12px;
        }

        .joke-delivery {
            font-size: 1.6rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-top: 20px;
        }

        .joke-rating {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .rating-stars {
            display: flex;
            gap: 4px;
        }

        .star {
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .star:hover {
            transform: scale(1.2);
        }

        .loading-state {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            min-height: 200px;
            font-size: 1.2rem;
            color: var(--text-muted);
        }

        .loading-spinner {
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Controls */
        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 32px;
        }

        @media (max-width: 600px) {
            .controls {
                grid-template-columns: 1fr;
            }
        }

        .btn {
            padding: 16px 32px;
            border: none;
            border-radius: 14px;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), #ff7722);
            color: #fff;
            box-shadow: 0 0 30px var(--primary-glow);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 50px var(--primary-glow);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: var(--text-main);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: var(--accent-cyan);
        }

        /* Settings Panel */
        .settings-panel {
            background: rgba(20, 20, 24, 0.5);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 32px;
        }

        .settings-title {
            font-weight: 800;
            margin-bottom: 16px;
            color: var(--accent-cyan);
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .setting-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .setting-row:last-child {
            border-bottom: none;
            margin-bottom: 0;
        }

        .setting-label {
            font-weight: 700;
            color: var(--text-main);
        }

        .toggle {
            width: 50px;
            height: 28px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            position: relative;
            cursor: pointer;
            transition: background 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .toggle.active {
            background: var(--accent-green);
            border-color: var(--accent-green);
        }

        .toggle-knob {
            width: 24px;
            height: 24px;
            background: #fff;
            border-radius: 50%;
            position: absolute;
            top: 2px;
            left: 2px;
            transition: left 0.3s;
        }

        .toggle.active .toggle-knob {
            left: 24px;
        }

        .select {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: var(--text-main);
            padding: 8px 12px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
        }

        /* Stats Panel */
        .stats-panel {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: rgba(255, 85, 0, 0.1);
            border: 1px solid rgba(255, 85, 0, 0.3);
            border-radius: 14px;
            padding: 20px;
            text-align: center;
        }

        .stat-value {
            font-size: 2.2rem;
            font-weight: 900;
            color: var(--primary);
            margin-bottom: 6px;
        }

        .stat-label {
            font-size: 0.9rem;
            color: var(--text-muted);
            font-weight: 600;
        }

        /* Toast Notification */
        #toast {
            position: fixed;
            top: 24px;
            right: 24px;
            background: #1c1c1e;
            border: 1px solid var(--accent-green);
            color: #fff;
            padding: 14px 22px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
            z-index: 5000;
            transform: translateX(400px);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        #toast.show {
            transform: translateX(0);
            opacity: 1;
        }

        /* Footer */
        .footer {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: 40px;
        }

        .footer a {
            color: var(--accent-cyan);
            text-decoration: none;
            font-weight: 700;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 2.4rem;
            }

            .joke-card {
                padding: 32px 24px;
            }

            .joke-text {
                font-size: 1.4rem;
            }

            .joke-setup,
            .joke-delivery {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <!-- Cosmic Background -->
    <div class="cosmic-orb orb-1"></div>
    <div class="cosmic-orb orb-2"></div>

    <!-- Main Container -->
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>🎭 Joke Generator</h1>
            <p>Powered by JokeAPI • Get random laughs instantly</p>
        </div>

        <!-- Settings Panel -->
        <div class="settings-panel">
            <div class="settings-title">⚙️ Settings</div>
            <div class="setting-row">
                <span class="setting-label">Joke Type</span>
                <select id="jokeType" class="select" onchange="updateSettings()">
                    <option value="any">Any Type</option>
                    <option value="single">Single (Short)</option>
                    <option value="twopart">Two Part (Setup/Delivery)</option>
                </select>
            </div>
            <div class="setting-row">
                <span class="setting-label">Explicit Content</span>
                <div class="toggle" id="toggleExplicit" onclick="toggleExplicit()">
                    <div class="toggle-knob"></div>
                </div>
            </div>
            <div class="setting-row">
                <span class="setting-label">Category</span>
                <select id="jokeCategory" class="select" onchange="updateSettings()">
                    <option value="">Any Category</option>
                    <option value="general">General</option>
                    <option value="programming">Programming</option>
                    <option value="knock-knock">Knock-Knock</option>
                </select>
            </div>
        </div>

        <!-- Stats -->
        <div class="stats-panel">
            <div class="stat-card">
                <div class="stat-value" id="statJokes">0</div>
                <div class="stat-label">Jokes Loaded</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="statRating">—</div>
                <div class="stat-label">Avg. Rating</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="statFavorites">0</div>
                <div class="stat-label">Favorites</div>
            </div>
        </div>

        <!-- Joke Display Card -->
        <div class="joke-card" id="jokeCard">
            <div class="loading-state">
                <div class="loading-spinner"></div>
                <span>Loading your first joke...</span>
            </div>
        </div>

        <!-- Controls -->
        <div class="controls">
            <button class="btn btn-primary" onclick="getJoke()">
                <span>🎲</span> Get Random Joke
            </button>
            <button class="btn btn-secondary" onclick="viewFavorites()">
                <span>❤️</span> View Favorites
            </button>
        </div>

        <!-- Footer -->
        <div class="footer">
            Built with ❤️ using <a href="https://jokeapi.dev" target="_blank">JokeAPI</a>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast"></div>

    <!-- JavaScript -->
    <script>
        // State Management
        let state = {
            currentJoke: null,
            favorites: JSON.parse(localStorage.getItem('jokerFavorites')) || [],
            jokesLoaded: parseInt(localStorage.getItem('jokerCount')) || 0,
            ratings: JSON.parse(localStorage.getItem('jokerRatings')) || {},
            settings: {
                type: 'any',
                explicit: true,
                category: ''
            }
        };

        // Initialize
        window.onload = () => {
            updateStats();
            getJoke();
        };

        // Get Joke from API
        async function getJoke() {
            const card = document.getElementById('jokeCard');
            card.innerHTML = '<div class="loading-state"><div class="loading-spinner"></div><span>Fetching joke...</span></div>';

            try {
                let url = 'https://v2.jokeapi.dev/joke/';

                if (state.settings.category) {
                    url += state.settings.category;
                } else {
                    url += 'Any';
                }

                const params = new URLSearchParams({
                    type: state.settings.type === 'any' ? '' : state.settings.type,
                    safe: state.settings.explicit ? 'no' : 'yes'
                });

                url += '?' + params.toString();

                const response = await fetch(url);
                const data = await response.json();

                if (data.error) {
                    throw new Error('No jokes found with selected filters');
                }

                state.currentJoke = data;
                state.jokesLoaded++;
                localStorage.setItem('jokerCount', state.jokesLoaded);

                displayJoke(data);
                updateStats();
                showToast('✨ New joke loaded!');

            } catch (error) {
                card.innerHTML = `
                    <div style="text-align: center; color: #ff5555;">
                        <div style="font-size: 2.4rem; margin-bottom: 12px;">⚠️</div>
                        <div style="font-size: 1.2rem; font-weight: 700;">Oops! ${error.message}</div>
                        <button class="btn btn-primary" style="margin-top: 20px;" onclick="getJoke()">Try Again</button>
                    </div>
                `;
            }
        }

        // Display Joke
        function displayJoke(joke) {
            const card = document.getElementById('jokeCard');
            const isFavorite = state.favorites.some(fav => fav.id === joke.id);

            let jokeContent = '';

            if (joke.type === 'single') {
                jokeContent = `
                    <div class="joke-content">
                        <div class="joke-text">${joke.joke}</div>
                        <div class="joke-rating">
                            <span style="color: var(--text-muted);">Rate this joke:</span>
                            <div class="rating-stars" id="ratingStars">
                                ${[1, 2, 3, 4, 5].map(i => `<span class="star" onclick="rateJoke(${i})">${i <= (state.ratings[joke.id] || 0) ? '⭐' : '☆'}</span>`).join('')}
                            </div>
                        </div>
                    </div>
                `;
            } else {
                jokeContent = `
                    <div class="joke-content">
                        <div class="joke-setup">${joke.setup}</div>
                        <div class="joke-delivery">${joke.delivery}</div>
                        <div class="joke-rating">
                            <span style="color: var(--text-muted);">Rate this joke:</span>
                            <div class="rating-stars" id="ratingStars">
                                ${[1, 2, 3, 4, 5].map(i => `<span class="star" onclick="rateJoke(${i})">${i <= (state.ratings[joke.id] || 0) ? '⭐' : '☆'}</span>`).join('')}
                            </div>
                        </div>
                    </div>
                `;
            }

            card.innerHTML = `
                <div>
                    <div class="joke-badge">
                        <span class="dot-loader"></span>
                        <span class="joke-category">${joke.category}</span>
                    </div>
                </div>
                ${jokeContent}
                <div style="display: flex; gap: 12px; margin-top: 24px; padding-top: 24px; border-top: 1px solid rgba(255,255,255,0.1);">
                    <button class="btn btn-secondary" style="flex: 1;" onclick="toggleFavorite(${joke.id})">
                        ${isFavorite ? '❤️ Favorited' : '🤍 Add to Favorites'}
                    </button>
                    <button class="btn btn-secondary" style="flex: 1;" onclick="shareJoke()">
                        📤 Share
                    </button>
                </div>
            `;
        }

        // Rate Joke
        function rateJoke(rating) {
            if (!state.currentJoke) return;
            state.ratings[state.currentJoke.id] = rating;
            localStorage.setItem('jokerRatings', JSON.stringify(state.ratings));
            displayJoke(state.currentJoke);
            updateStats();
            showToast(`⭐ Rated ${rating} stars!`);
        }

        // Toggle Favorite
        function toggleFavorite(jokeId) {
            const index = state.favorites.findIndex(fav => fav.id === jokeId);
            if (index > -1) {
                state.favorites.splice(index, 1);
                showToast('💔 Removed from favorites');
            } else {
                state.favorites.push(state.currentJoke);
                showToast('❤️ Added to favorites!');
            }
            localStorage.setItem('jokerFavorites', JSON.stringify(state.favorites));
            updateStats();
            displayJoke(state.currentJoke);
        }

        // View Favorites
        function viewFavorites() {
            if (state.favorites.length === 0) {
                showToast('📭 No favorites yet! Add some jokes first.');
                return;
            }
            const joke = state.favorites[Math.floor(Math.random() * state.favorites.length)];
            state.currentJoke = joke;
            displayJoke(joke);
            showToast('❤️ Showing random favorite!');
        }

        // Share Joke
        function shareJoke() {
            if (!state.currentJoke) return;
            let text = '';
            if (state.currentJoke.type === 'single') {
                text = state.currentJoke.joke;
            } else {
                text = `${state.currentJoke.setup}\n\n${state.currentJoke.delivery}`;
            }

            if (navigator.share) {
                navigator.share({
                    title: '😄 Check out this joke!',
                    text: text
                });
            } else {
                navigator.clipboard.writeText(text);
                showToast('📋 Joke copied to clipboard!');
            }
        }

        // Toggle Explicit
        function toggleExplicit() {
            const toggle = document.getElementById('toggleExplicit');
            state.settings.explicit = !toggle.classList.contains('active');
            toggle.classList.toggle('active');
            updateSettings();
        }

        // Update Settings
        function updateSettings() {
            state.settings.type = document.getElementById('jokeType').value;
            state.settings.category = document.getElementById('jokeCategory').value;
            showToast('⚙️ Settings updated!');
            getJoke();
        }

        // Update Stats
        function updateStats() {
            document.getElementById('statJokes').textContent = state.jokesLoaded;
            document.getElementById('statFavorites').textContent = state.favorites.length;

            if (Object.keys(state.ratings).length > 0) {
                const avgRating = (Object.values(state.ratings).reduce((a, b) => a + b, 0) / Object.keys(state.ratings).length).toFixed(1);
                document.getElementById('statRating').textContent = avgRating + '⭐';
            }
        }

        // Toast Notification
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }
    </script>
</body>
</html>
